<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>런치콕(LunchKok) - 점심메뉴 고민 끝, 3초만에 맛집 찾기</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet" />
<style>
  :root{
    --primary: #FF5533;
    --primary-dark: #E0492D;
    --primary-light: #FFEFEA;
    --accent: #FFC93C;
    --trust: #2E9E6B;
    --trust-dark: #1E6746;
    --ink: #212121;
    --sub: #6B6B6B;
    --bg: #FFF8F1;
    --card-bg: #FFFFFF;
    --border: #F0E5DF;
    --shadow: 0 10px 30px rgba(255, 90, 54, 0.12);
    --radius: 18px;
    --font-heading: 'Jua', -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    --font-body: 'Gowun Dodum', -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", Roboto, sans-serif;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; overflow-x: hidden; width:100%; }
  body{
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
    font-size: 15px;
  }
  a{ color: inherit; }
  img{ max-width:100%; }

  /* ---------- 배경 음식 이모지 비 ---------- */
  .food-rain{
    position: fixed; inset:0;
    overflow: hidden;
    pointer-events: none;
    z-index: -1;
  }
  .food-rain span{
    position:absolute; top:-10%;
    opacity:.5;
    animation-name: foodFall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.08));
  }
  @keyframes foodFall{
    0%{ transform: translateY(0) rotate(0deg); }
    100%{ transform: translateY(120vh) rotate(360deg); }
  }

  /* ---------- Header ---------- */
  .site-header{
    position: sticky; top:0; z-index: 50;
    display:flex; align-items:center; justify-content:space-between;
    padding: 16px 24px;
    background: rgba(255,252,250,0.9);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
  }
  .logo{
    display:flex; align-items:center; gap:8px;
    font-family: var(--font-heading);
    font-size: 22px; font-weight: 400; color: var(--primary-dark);
  }
  .tagline-small{
    font-size: 12.5px; color: var(--sub); font-weight: 600;
    letter-spacing: 0.5px;
  }

  main{ max-width: 720px; margin: 0 auto; padding: 0 20px 60px; }

  /* ---------- Hero ---------- */
  .hero{ text-align:center; padding: 44px 0 20px; }
  .hero h1{
    font-family: var(--font-heading);
    font-size: clamp(30px, 7vw, 42px);
    font-weight: 400;
    margin: 0 0 12px;
  }
  .hero h1 .highlight{
    color: var(--primary);
    position: relative;
  }
  .hero-sub{
    color: var(--sub);
    font-size: 16px;
    margin: 0 0 30px;
  }

  /* ---------- Video Intro (vlog-style teaser) ---------- */
  .video-intro{
    position: relative;
    display: grid;
    width: 100%;
    max-width: 600px;
    aspect-ratio: 1 / 1;
    border-radius: 22px;
    overflow: hidden;
    margin: 4px auto 30px;
    box-shadow: 0 16px 34px rgba(255,90,54,0.22);
  }
  .vi-panel{
    position: relative;
    width: 100%; height: 100%;
    overflow: hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .vi-main{ background: #3B2A22; }

  /* 화면 전체가 아기 얼굴이고, 그대로 입 속으로 줌인되는 연출 */
  .vi-zoom{
    position:absolute; inset:0;
    transform-origin: 53% 86%;
    animation: viZoom 2s cubic-bezier(.6,0,.85,1) infinite;
  }
  .vi-photo{
    width:100%; height:100%;
    object-fit: cover;
    object-position: 50% 22%;
    display:block;
  }
  /* 화면 전체를 입으로 끌어당겨 확대하는 스왈로우 연출 */
  .vi-swallow-fade{
    position:absolute; inset:0;
    background:#0a0503;
    opacity:0;
    z-index: 20;
    pointer-events: none;
    border-radius: inherit;
    animation: viSwallowFade 2s cubic-bezier(.4,0,.7,1) infinite;
  }
  @keyframes viZoom{
    0%, 58%{ transform: scale(1); }
    82%{ transform: scale(3.6); }
    96%{ transform: scale(9); }
    100%{ transform: scale(9); }
  }
  @keyframes viSwallowFade{
    0%{ opacity:1; }
    6%{ opacity:0; }
    58%{ opacity:0; }
    88%{ opacity:.5; }
    100%{ opacity:1; }
  }
  .vi-bowl{
    position:absolute; left:50%; bottom: 6%; transform: translateX(-70%);
    width: 56px; height:auto; z-index:1;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.25));
    animation: viAccessoryFade 2s cubic-bezier(.4,0,.7,1) infinite;
  }
  .vi-sticks{
    position:absolute; left:50%; bottom: 18%; transform: translateX(20px) rotate(-18deg);
    width: 40px; height:auto; z-index:3; transform-origin: 85% 90%;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
    animation: viSticks 0.9s ease-in-out infinite, viAccessoryFade 2s cubic-bezier(.4,0,.7,1) infinite;
  }
  @keyframes viSticks{
    0%, 100%{ transform: translateX(22px) rotate(-18deg) translateY(0); }
    40%, 55%{ transform: translateX(4px) rotate(-32deg) translateY(-28px); }
  }
  @keyframes viAccessoryFade{
    0%, 50%{ opacity: 1; }
    56%{ opacity: 0; }
    100%{ opacity: 0; }
  }

  .vi-watermark{
    position:absolute; top:10px; right:10px;
    width: 28px; height:28px; border-radius:50%;
    background: rgba(255,255,255,0.9);
    display:flex; align-items:center; justify-content:center;
    font-size: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  }
  .vi-live{
    position:absolute; top:10px; left:10px;
    display:flex; align-items:center; gap:4px;
    background: rgba(0,0,0,0.55); color:#fff;
    font-size: 10px; font-weight:800; letter-spacing:.3px;
    padding: 4px 8px 4px 6px; border-radius: 6px;
  }
  .vi-live::before{ content:""; width:6px; height:6px; border-radius:50%; background:#FF4D4D; box-shadow:0 0 0 0 rgba(255,77,77,.6); animation: livePulse 1.4s infinite; }
  @keyframes livePulse{
    0%{ box-shadow: 0 0 0 0 rgba(255,77,77,.6); }
    70%{ box-shadow: 0 0 0 6px rgba(255,77,77,0); }
    100%{ box-shadow: 0 0 0 0 rgba(255,77,77,0); }
  }
  .vi-caption{
    position:absolute; left:0; right:0; bottom:0;
    padding: 10px 14px 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.75));
    color:#fff; font-weight:800; font-size: 13.5px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    min-height: 18px;
    transition: opacity .2s ease;
  }
  .vi-tag{
    position:absolute; left:8px; bottom:8px;
    background: rgba(0,0,0,0.55); color:#fff;
    font-size: 10.5px; font-weight:800; padding: 3px 8px; border-radius:999px;
  }
  @media (max-width: 420px){
    .vi-bowl{ width: 44px; }
    .vi-sticks{ width: 32px; bottom: 16%; }
  }

  /* ---------- Search Card ---------- */
  .search-card{
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 26px 22px;
    text-align: left;
  }
  .field{ margin-bottom: 20px; }
  .field label{
    display:block;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--ink);
  }
  .field input[type="text"]{
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
    background: #FFFDFB;
  }
  .field input[type="text"]:focus{
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(255,90,54,0.12);
  }
  .field input.shake{ animation: shake .35s; border-color: var(--primary); }
  @keyframes shake{
    0%,100%{ transform: translateX(0); }
    25%{ transform: translateX(-6px); }
    75%{ transform: translateX(6px); }
  }

  /* quick tags - 요소3 */
  .tag-list{
    display:flex; flex-wrap:wrap; gap:8px; margin-top: 12px;
  }
  .tag-chip{
    border: 1px solid var(--border);
    background: var(--primary-light);
    color: var(--primary-dark);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s ease;
  }
  .tag-chip:hover{ background: var(--primary); color:#fff; transform: translateY(-1px); }
  .tag-chip.active{ background: var(--primary); color:#fff; border-color: var(--primary); }

  .location-row{ display:flex; gap:8px; min-width:0; }
  .location-row input{ flex:1; min-width:0; }
  .gps-btn{
    flex-shrink:0;
    padding: 0 16px;
    border: 2px solid var(--border);
    background:#fff;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor:pointer;
    white-space:nowrap;
    transition: all .15s ease;
  }
  .gps-btn:hover{ border-color: var(--primary); color: var(--primary-dark); }
  .gps-btn.loading{ opacity: .6; pointer-events:none; }

  .map-select-btn{
    margin-top: 10px;
    width: 100%;
    padding: 12px;
    background: #F2FAF6;
    border: 1.5px dashed var(--trust);
    color: var(--trust-dark);
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: background .15s ease;
  }
  .map-select-btn:hover{ background:#EAF6F3; }

  .search-btn{
    width: 100%;
    padding: 17px;
    font-family: var(--font-heading);
    font-size: 18px;
    font-weight: 400;
    color: #fff;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border:none;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(255,90,54,0.35);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .search-btn:hover{ transform: translateY(-2px); box-shadow: 0 12px 26px rgba(255,90,54,0.42); }
  .search-btn:active{ transform: translateY(0); }
  .search-btn:disabled{ opacity:.7; cursor:default; transform:none; }

  /* ---------- Trust section ---------- */
  .trust-section{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 34px;
    text-align:center;
  }
  .trust-item{
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 8px;
  }
  .trust-item .emoji{ font-size: 24px; display:block; margin-bottom: 6px; }
  .trust-item .t{ font-size: 14px; font-weight: 800; margin-bottom: 2px; }
  .trust-item .d{ font-size: 12.5px; color: var(--sub); }

  /* ---------- Results ---------- */
  .results-section{ margin-top: 42px; }
  .results-section.hidden{ display:none; }
  .results-section h2{
    font-family: var(--font-heading);
    font-size: 22px; font-weight: 400; margin-bottom: 4px;
  }
  .results-meta{ color: var(--sub); font-size: 13.5px; margin-bottom: 16px; }

  .skeleton-list{ display:flex; flex-direction:column; gap: 12px; }
  .skeleton-card{
    height: 108px;
    border-radius: 16px;
    background: linear-gradient(90deg, #F3ECE8 25%, #FBF6F3 37%, #F3ECE8 63%);
    background-size: 400% 100%;
    animation: shimmer 1.2s ease infinite;
  }
  @keyframes shimmer{
    0%{ background-position: 100% 50%; }
    100%{ background-position: 0 50%; }
  }

  .results-list{ display:flex; flex-direction:column; gap: 12px; }
  .no-results{
    text-align:center; padding: 40px 20px;
    color: var(--sub); font-size: 14px; line-height:1.7;
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px;
  }
  .result-card{
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 18px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    animation: fadeUp .35s ease both;
  }
  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .result-top{ display:flex; flex-direction:column; gap: 2px; }
  .result-name{ font-family: var(--font-heading); font-size: 18px; font-weight: 400; }
  .result-loc{ font-size: 12.5px; color: var(--sub); }
  .result-badges{ display:flex; gap:6px; margin: 6px 0 8px; flex-wrap:wrap; }
  .badge{
    font-size: 11.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px;
  }
  .badge.match{ background: var(--primary-light); color: var(--primary-dark); }
  .badge.rating{ background: #FFF8E1; color: #B8860B; }
  .badge.price{ background: #F0F0F5; color: #55506B; }
  .review-columns{
    display:flex; gap: 10px; margin-bottom: 10px;
  }
  .review-col{
    flex: 1; min-width: 0;
    padding: 9px 11px;
    border-radius: 10px;
    font-size: 13px;
  }
  .review-col.good{ background: #F3FBF7; border-left: 3px solid var(--trust); }
  .review-col.bad{ background: #FEF4F2; border-left: 3px solid #E0574B; }
  .review-col-title{ font-weight: 800; font-size: 12.5px; margin-bottom: 6px; }
  .review-col.good .review-col-title{ color: var(--trust-dark); }
  .review-col.bad .review-col-title{ color: #C0392B; }
  .review-col ul{ margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:5px; }
  .review-col li{ color:#4A4A4A; line-height:1.4; }
  .review-col li::before{ content:"· "; color:#B0AFAF; }

  @media (max-width: 380px){
    .review-columns{ flex-direction: column; }
  }
  .result-bottom{ display:flex; justify-content:space-between; align-items:center; }
  .review-count{ font-size: 12px; color: var(--sub); }
  .map-link{
    font-size: 12.5px; font-weight: 700; color: var(--trust-dark);
    text-decoration:none; display:flex; align-items:center; gap:4px;
  }
  .map-link:hover{ text-decoration: underline; }

  footer{
    text-align:center; padding: 30px 20px 40px;
    color: var(--sub); font-size: 12px;
  }

  /* ---------- Modal ---------- */
  .modal-overlay{
    position: fixed; inset:0; background: rgba(20,15,12,0.5);
    display:flex; align-items:flex-end; justify-content:center;
    z-index: 100;
  }
  .modal-overlay.hidden{ display:none; }
  .modal-sheet{
    background:#fff; width:100%; max-width: 480px;
    border-radius: 20px 20px 0 0;
    padding: 22px 20px 28px;
    animation: slideUp .25s ease;
  }
  @media (min-width:560px){
    .modal-overlay{ align-items:center; }
    .modal-sheet{ border-radius: 20px; }
  }
  @keyframes slideUp{ from{ transform: translateY(30px); opacity:0;} to{ transform: translateY(0); opacity:1;} }
  .modal-sheet h3{ font-family: var(--font-heading); font-weight: 400; margin: 0 0 4px; font-size: 19px; }
  .modal-sheet p{ margin: 0 0 16px; font-size: 13.5px; color: var(--sub); }
  .map-visual{
    height: 170px;
    border-radius: 14px;
    background:
      radial-gradient(circle at 50% 55%, rgba(255,90,54,0.25) 0, rgba(255,90,54,0) 60%),
      linear-gradient(135deg, #DFF3EE, #F3FBF8);
    border: 1px solid var(--border);
    position: relative;
    margin-bottom: 16px;
    overflow:hidden;
  }
  .map-visual::before{
    content:"📍";
    position:absolute; left:50%; top:50%;
    transform: translate(-50%, -70%);
    font-size: 32px;
  }
  .map-visual::after{
    content:"네이버 지도 연동 영역";
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    font-size: 11px; color: var(--sub); background: rgba(255,255,255,0.8);
    padding: 2px 8px; border-radius: 8px;
  }
  .preset-list{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom: 18px; }
  .preset-btn{
    border:1px solid var(--border); background:#fff;
    padding: 8px 14px; border-radius: 10px; font-size:14px; font-weight:600;
    cursor:pointer;
  }
  .preset-btn:hover{ border-color: var(--primary); color: var(--primary-dark); }
  .modal-close{
    width:100%; padding:13px; border:none; border-radius:12px;
    background: var(--ink); color:#fff; font-weight:700; cursor:pointer;
  }

  @media (max-width: 420px){
    .site-header{ padding: 14px 16px; }
    .search-card{ padding: 20px 16px; }
    .trust-section{ gap: 8px; }
    .trust-item{ padding: 12px 6px; }
  }
</style>
</head>
<body>
  <div class="food-rain" id="foodRain" aria-hidden="true"></div>

  <header class="site-header">
    <div class="logo">🍽️ <span>런치콕</span></div>
    <div class="tagline-small">LunchKok</div>
  </header>

  <main>
    <section class="hero">
      <div class="video-intro">
        <div class="vi-panel vi-main">
          <div class="vi-zoom">
            <img class="vi-photo" src="baby.png" alt="놀란 표정으로 입을 벌린 아기 캐릭터" />
            <img class="vi-sticks" src="chopsticks.png" alt="젓가락" />
            <img class="vi-bowl" src="dimsum.png" alt="찐만두(딤섬)" />
          </div>
          <div class="vi-live">LIVE</div>
          <div class="vi-watermark">🍽️</div>
          <div class="vi-caption" id="viCaption">여기는 리뷰가 진짜 착한 편이고 👍</div>
          <div class="vi-swallow-fade"></div>
        </div>
      </div>

      <h1>점심시간, <span class="highlight">3초</span>면 충분해요</h1>
      <p class="hero-sub">먹고 싶은 메뉴만 콕! 찍으면<br/>주변 맛집과 찐 후기를 바로 보여드려요</p>

      <div class="search-card">
        <div class="field">
          <label for="menuInput">🍜 어떤 메뉴가 땡기세요?</label>
          <input id="menuInput" type="text" placeholder="예: 김치찌개, 파스타, 초밥..." autocomplete="off" />
          <div class="tag-list" id="tagList"></div>
        </div>

        <div class="field">
          <label for="locationInput">📍 어디 근처에서 찾을까요? <span style="color:#9a9a9a; font-weight:500;">(네이버 지도 기준)</span></label>
          <div class="location-row">
            <input id="locationInput" type="text" placeholder="예: 강남역 2번 출구" autocomplete="off" />
            <button id="gpsBtn" class="gps-btn" type="button">📍 내 위치</button>
          </div>
          <button id="mapSelectBtn" class="map-select-btn" type="button">🗺️ 네이버 지도에서 위치 선택</button>
        </div>

        <button id="searchBtn" class="search-btn" type="button">지금 맛집 콕! 찍기 🔍</button>
      </div>
    </section>

    <section class="trust-section">
      <div class="trust-item">
        <span class="emoji">⭐</span>
        <div class="t">찐 후기만</div>
        <div class="d">실제 이용자 리뷰 기반</div>
      </div>
      <div class="trust-item">
        <span class="emoji">⚡</span>
        <div class="t">3초 완성</div>
        <div class="d">고민할 시간에 먹으러 GO</div>
      </div>
      <div class="trust-item">
        <span class="emoji">📍</span>
        <div class="t">내 주변만</div>
        <div class="d">네이버 지도 기준 근처 매장</div>
      </div>
    </section>

    <section id="resultsSection" class="results-section hidden">
      <h2 id="resultsTitle">추천 맛집</h2>
      <div class="results-meta" id="resultsMeta"></div>
      <div id="resultsBody"></div>
    </section>
  </main>

  <footer>
    © 2026 런치콕(LunchKok) · 점심시간을 아껴드립니다 🍚
  </footer>

  <!-- 네이버 지도 위치 선택 모달 -->
  <div id="mapModal" class="modal-overlay hidden">
    <div class="modal-sheet">
      <h3>지도에서 위치 선택</h3>

  function isNearLocation(restaurant, location) {
    const loc = location.trim();
    if (!loc) return false;
    return restaurant.location.includes(loc) || loc.split(' ').some(tok => tok.length > 1 && restaurant.location.includes(tok));
  }

  function scoreRestaurant(r, group, location) {
    const norm = (val, arr, invert) => {
      const min = Math.min(...arr), max = Math.max(...arr);
      if (max === min) return 1;
      const n = (val - min) / (max - min);
      return invert ? 1 - n : n;
    };
    const revenueScore = norm(r.revenue, group.map(x => x.revenue));
    const priceScore = norm(r.priceValue, group.map(x => x.priceValue), true);
    const ratingScore = norm(r.rating, group.map(x => x.rating));
    const reviewCountScore = norm(r.reviewCount, group.map(x => x.reviewCount));
    let score = revenueScore * 0.3 + priceScore * 0.25 + ratingScore * 0.25 + reviewCountScore * 0.2;
    if (location && isNearLocation(r, location)) score += 0.15;
    return score;
  }

  // 매출 · 가격 · 리뷰(평점+리뷰수)를 점수화해서 상위 3곳만 추천
  function generateResults(menu, location) {
    const q = menu.trim();
    const matches = SAMPLE_RESTAURANTS.filter(r =>
      r.menu.includes(q) || r.name.includes(q) || q.includes(r.menu) || r.menu.split(' ').some(word => q.includes(word))
    );
    const ranked = matches
      .map(r => ({ r, score: scoreRestaurant(r, matches, location) }))
      .sort((a, b) => b.score - a.score)
      .slice(0, 3)
      .map(x => x.r);
    return ranked.map(r => ({
      ...r,
      mapUrl: `https://map.naver.com/v5/search/${encodeURIComponent(r.name + ' ' + r.location)}`,
      nearLocation: location ? isNearLocation(r, location) : false
    }));
  }

    resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

    setTimeout(() => {
      const results = generateResults(menu, location);
      renderResults(results, menu, location);
      searchBtn.disabled = false;
      searchBtn.textContent = '지금 맛집 콕! 찍기 🔍';
    }, 700);
  });

  menuInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') searchBtn.click();
  });
  locationInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') searchBtn.click();
  });
</script>
</body>
</html>
